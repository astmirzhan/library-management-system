<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Profile · Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body>
<section id="appView">
    <aside class="sidebar">
        <div class="brand"><span class="brand-mark">⌁</span> Library</div>
        <nav class="nav">
            <a th:href="@{/catalog}">📖 Book catalog</a>
            <a th:href="@{/borrowings}">📋 My borrowed books</a>
            <a th:href="@{/profile}" class="active">👤 My profile</a>
        </nav>
        <div class="user-chip">
            <div class="user-row">
                <div class="avatar"
                     th:text="${#strings.toUpperCase(#strings.substring(user.username, 0, 2))}">MM
                </div>
                <div class="user-meta">
                    <strong th:text="${user.username}">User</strong>
                    <small th:text="${user.role.name() + ' account'}">Reader account</small>
                </div>
                <a th:href="@{/logout}" class="logout" title="Sign out">↪</a>
            </div>
        </div>
    </aside>

    <main class="main">
        <header class="topbar">
            <div class="top-actions">
                <div class="page-title">
                    <h1>My profile</h1>
                    <p>View and update your account details.</p>
                </div>
            </div>
        </header>

        <div th:if="${success}" class="panel"
             style="margin-bottom:20px; padding:14px 18px; background:var(--brand-2); color:var(--brand); border-color:var(--brand);"
             th:text="${success}"></div>
        <div th:if="${error}" class="panel"
             style="margin-bottom:20px; padding:14px 18px; background:#f7e2e0; color:var(--danger);"
             th:text="${error}"></div>

        <div class="split-grid">
            <!-- Read-only summary -->
            <div class="panel" style="padding: 24px;">
                <span class="eyebrow" style="color: var(--brand);">Account</span>
                <h2 style="margin: 8px 0 16px;" th:text="${user.username}">username</h2>
                <p style="margin: 0 0 8px;"><strong>Role:</strong>
                    <span class="status" th:text="${user.role.name()}">ROLE</span></p>
                <p style="margin: 0 0 8px;"><strong>Member since:</strong>
                    <span th:text="${user.registrationDate}">date</span></p>
                <p style="margin: 0;"><strong>User ID:</strong>
                    #<span th:text="${user.userId}">0</span></p>
            </div>

            <!-- Edit form -->
            <div class="panel" style="padding: 24px;">
                <span class="eyebrow" style="color: var(--brand);">Edit details</span>
                <form method="post" th:action="@{/profile/update}"
                      style="display: grid; gap: 14px; margin-top: 12px;">
                    <div>
                        <label for="username"><strong>Username</strong></label>
                        <input type="text" id="username" name="username" required minlength="3"
                               th:value="${user.username}">
                    </div>
                    <div>
                        <label for="email"><strong>Email</strong></label>
                        <input type="email" id="email" name="email" required
                               th:value="${user.email}">
                    </div>
                    <div>
                        <label for="phoneNumber"><strong>Phone number</strong></label>
                        <input type="text" id="phoneNumber" name="phoneNumber"
                               th:value="${user.phoneNumber}">
                    </div>
                    <button type="submit" class="btn" style="justify-self: start;">Save changes</button>
                </form>
            </div>
        </div>
    </main>
</section>
</body>
</html>
