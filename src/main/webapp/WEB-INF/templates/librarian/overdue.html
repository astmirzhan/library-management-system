<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Overdue · Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body>
<section id="appView">
    <aside class="sidebar">
        <div class="brand"><span class="brand-mark">⌁</span> Library</div>
        <nav class="nav">
            <a th:href="@{/librarian/dashboard}">📊 Dashboard</a>
            <a th:href="@{/librarian/books}">📖 Book inventory</a>
            <a th:href="@{/librarian/borrows}">📋 Borrowing records</a>
            <a th:href="@{/librarian/overdue}" class="active">⏰ Overdue</a>
            <a th:href="@{/catalog}">🔍 View catalog</a>
        </nav>
        <div class="user-chip">
            <div class="user-row">
                <div class="avatar"
                     th:text="${#strings.toUpperCase(#strings.substring(user.username, 0, 2))}">L
                </div>
                <div class="user-meta">
                    <strong th:text="${user.username}">User</strong>
                    <small th:text="${user.role.name() + ' account'}">Librarian account</small>
                </div>
                <a th:href="@{/logout}" class="logout" title="Sign out">↪</a>
            </div>
        </div>
    </aside>

    <main class="main">
        <header class="topbar">
            <div class="top-actions">
                <div class="page-title">
                    <h1>Overdue borrowings</h1>
                    <p>Loans past their due date — send reminders.</p>
                </div>
            </div>
        </header>

        <div th:if="${success}" class="panel"
             style="margin-bottom:20px; padding:14px 18px; background:var(--brand-2); color:var(--brand); border-color:var(--brand);"
             th:text="${success}"></div>

        <div th:if="${#lists.isEmpty(overdue)}" class="panel empty">
            No overdue borrowings. 🎉
        </div>

        <div th:if="${not #lists.isEmpty(overdue)}" class="panel table-wrap">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Reader ID</th>
                    <th>Copy ID</th>
                    <th>Borrowed</th>
                    <th>Due date</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="record : ${overdue}">
                    <td>#<span th:text="${record.borrowId}">1</span></td>
                    <td th:text="${record.userId}">1</td>
                    <td th:text="${record.copyId}">1</td>
                    <td th:text="${record.borrowDate}">date</td>
                    <td><span class="status out" th:text="${record.dueDate}">date</span></td>
                    <td>
                        <form method="post"
                              th:action="@{/librarian/overdue/remind/{id}(id=${record.borrowId})}"
                              style="display:inline">
                            <button type="submit" class="btn secondary small">✉ Send reminder</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</section>
</body>
</html>
