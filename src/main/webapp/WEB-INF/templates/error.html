<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Error · Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body>
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;">
    <div class="panel" style="max-width: 480px; width: 100%; padding: 40px; text-align: center;">
        <div class="brand" style="justify-content: center; margin-bottom: 16px;">
            <span class="brand-mark">⌁</span> Library
        </div>
        <div style="font-size: 48px; line-height: 1; margin-bottom: 12px;">⚠️</div>
        <h1 style="margin: 0 0 8px;">Something went wrong</h1>
        <p style="color: var(--muted); margin: 0 0 24px;"
           th:text="${error} ?: 'An unexpected error occurred. Please try again.'">
            An unexpected error occurred. Please try again.
        </p>
        <a th:href="@{/}" class="btn">← Back to home</a>
    </div>
</div>
</body>
</html>
